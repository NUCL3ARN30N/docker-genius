<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Docker Genius</title>
<meta name="description" content="Browser-based Docker management dashboard. No servers, no logins.">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%236c5ce7'%3E%3Crect x='2' y='2' width='9' height='9' rx='2'/%3E%3Crect x='13' y='2' width='9' height='9' rx='2'/%3E%3Crect x='2' y='13' width='9' height='9' rx='2'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.6.0/remixicon.min.css">
<link rel="stylesheet" href="style.css">
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://unpkg.com/@babel/standalone@7.26.2/babel.min.js"></script>
<script>
window.onerror = function(msg, src, line, col, err) {
  document.getElementById("root").innerHTML =
    '<div style="padding:40px;font-family:monospace;color:#e17055;background:#16161b;border:1px solid #2a2a33;border-radius:12px;margin:40px;white-space:pre-wrap">' +
    '<h2 style="color:#f0eff4;margin-bottom:12px">Render Error</h2>' +
    msg + '\nLine: ' + line + '\n\n' + (err && err.stack ? err.stack : '') + '</div>';
};
</script>
</head>
<body>
<div class="ambg"></div>
<div id="root"></div>
<script type="text/babel" src="app.js"></script>
</body>
</html>
